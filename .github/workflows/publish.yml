name: publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Exchange GitHub OIDC token for npm token
        id: exchange
        run: |
          echo "Getting GitHub OIDC token..."
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          echo "OIDC token response: $(echo $OIDC_TOKEN | jq -c .)"
          OIDC_VALUE=$(echo "$OIDC_TOKEN" | jq -r '.value')
          echo "Exchanging with npm..."
          NPM_TOKEN_RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@yoshi-dai%2fyori" \
            -H "Authorization: Bearer $OIDC_VALUE")
          echo "npm response: $NPM_TOKEN_RESP"
          NPM_TOKEN=$(echo "$NPM_TOKEN_RESP" | head -1)
          echo "auth_token=$(echo "$NPM_TOKEN" | jq -r '.token // empty')" >> "$GITHUB_OUTPUT"
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ steps.exchange.outputs.auth_token }}
