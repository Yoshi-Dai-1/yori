# ハーネス リソースマニフェスト
#
# yori_version: setup-harness.sh 実行時に自動記入される
# external_skills: 同梱スキル + 後からインストールされた外部スキル
#   - 同梱スキル（find-skills / skill-creator）: 静的エントリ（setup-harness.sh）
#   - 動的スキル: lockfile-record.ts Plugin がインストール検出時に自動追記
#     検出パターン: npx skills add / git clone / git submodule add / cp -r / _install.sh
#   - バージョン管理は各エコシステムに委ねる（lock は記録のみ）
#
# このファイルは setup-harness.sh + lockfile-record.ts Plugin によって
# 自動管理される。手動編集は不要。

yori_version: ""

external_skills:
  find-skills:
    source: https://github.com/vercel-labs/skills.git
  skill-creator:
    source: https://github.com/anthropics/skills.git
